:"Estrutura HTML básica: h1, h2, p, head, body",tips:[`🍃 DICA #1 — DOCTYPE

O <!DOCTYPE html> deve ser SEMPRE a primeira linha. Informa ao navegador que usamos HTML5.

Sem ele, o browser entra em "modo quirks" e pode renderizar tudo errado!

Exemplo:
<!DOCTYPE html>
<html lang="pt-br">
  ...
</html>`,`🍃 DICA #2 — Hierarquia de Títulos

Use h1 para o título mais importante (apenas 1 por página!).
Use h2, h3... para subtítulos em ordem decrescente de importância.

Nunca pule níveis:
❌ h1 → h3 (pulou h2)
✅ h1 → h2 → h3`,`🍃 DICA #3 — Fechar Tags

Toda tag aberta DEVE ser fechada!
<p>texto</p>  ← abertura e fechamento

✅ Correto:
<h1>Título</h1>
<p>Texto aqui</p>

❌ Errado:
<h1>Título
<p>Texto aqui`,`🍃 DICA #4 — CSS Básico

seletor {
  propriedade: valor;
}

Exemplo:
h1 {
  color: orange;
  font-size: 2em;
  text-align: center;
}`],starterHtml:`<!DOCTYPE html>
\x3C!-- =============================================
  EX-01 | Tema: Naruto 🍃
  Objetivo: Criar estrutura básica HTML
  Tags: h1, h2, p, head, body
  ============================================= -->
<html lang="pt-br">

<head>
  \x3C!-- HEAD: metadados — não aparecem na tela! -->
  <meta charset="UTF-8">
  <title>Meu Ninja Favorito</title>
</head>

<body>
  \x3C!-- BODY: tudo que o usuário vê fica aqui -->

  \x3C!-- h1: Título principal — use APENAS 1 por página! -->
  <h1>Naruto Uzumaki</h1>

  \x3C!-- h2: Subtítulo — pode usar vários -->
  <h2>Hokage da Aldeia da Folha 🏮</h2>

  \x3C!-- p: Parágrafo de texto -->
  <p>
    Naruto é um ninja que nunca desiste dos seus sonhos.
    Sua técnica mais famosa é o Rasengan!
  </p>

  \x3C!-- ✏️ DESAFIO: Adicione mais informações sobre o personagem! -->

</body>

</html>`,starterCss:`/* =============================================
  CSS do EX-01 — Estilo Básico
  Sintaxe: seletor { propriedade: valor; }
  ============================================= */

/* Estiliza o elemento body (toda a página) */
body {
  background-color: #1a1a2e;     /* Cor de fundo */
  color: #eeeeee;                 /* Cor do texto */
  font-family: Arial, sans-serif; /* Fonte */
  text-align: center;             /* Centralizar */
  padding: 30px;                  /* Espaço interno */
}

/* Estiliza o título h1 */
h1 {
  color: #ff9f1c;    /* Laranja — cor do Naruto! */
  font-size: 2.5em;  /* 2.5x o tamanho padrão */
  margin-bottom: 4px;
}

/* Estiliza o subtítulo h2 */
h2 {
  color: #a8dadc;
  font-size: 1.3em;
}

/* Estiliza os parágrafos */
p {
  max-width: 400px;
  margin: 16px auto;  /* 'auto' centraliza horizontalmente */
  line-height: 1.7;   /* Espaçamento entre linhas */
  color: #ccc;
}

/* ✏️ DESAFIO: Adicione mais estilos abaixo! */`},{id:"EX-02",title:"Lista de Feitiços",icon:"🧙",theme:"Harry Potter",difficulty:"Básico",diffClass:"badge-basic",color:"#c41e3a",accent1:"#c41e3a",accent2:"#7b68ee",xp:150,description:"Crie listas de feitiços de Hogwarts! Aprenda listas ordenadas, não-ordenadas e links mágicos.",objective:"Tags de lista: ul, ol, li — e links: a href",tips:[`🧙 DICA #1 — ul vs ol

<ul> (Unordered List) = lista com bolinhas •
<ol> (Ordered List) = lista com números 1, 2, 3...

Dentro de ambas, use <li> para cada item:

<ul>
  <li>Primeiro item</li>
  <li>Segundo item</li>
</ul>`,`🧙 DICA #2 — Links (tag a)

A tag <a> cria links. O atributo href define o destino.

Exemplos:
<a href="https://google.com">Ir ao Google</a>
<a href="pagina.html">Página interna</a>
<a href="#">Link provisório</a>`,`🧙 DICA #3 — target="_blank"

Abre o link em uma nova aba!

<a href="https://harrypotter.com" target="_blank">
  Abrir em nova aba
</a>`,`🧙 DICA #4 — Margin vs Padding

margin = espaço FORA do elemento
padding = espaço DENTRO do elemento

Imagine uma caixa:
